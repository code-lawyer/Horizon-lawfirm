name: daily-summary

# Runs Horizon once a day. Horizon's webhook (see data/config.json) pushes the
# finished briefing to the mainland site (/api/ingest). No email / GitHub Pages
# delivery here.
on:
  schedule:
    # 00:00 UTC == 08:00 Beijing time. GitHub cron can lag a few minutes.
    - cron: "0 0 * * *"
  workflow_dispatch: {} # allow manual runs for testing

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run Horizon (last 24h)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: uv run horizon --hours 24
